<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>田野浜謎解きVR - 現在異空間からの脱出(試作)</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <style>
      html, body { margin: 0; background: #02050a; }
      .a-enter-vr-button { right: 16px; bottom: 16px; }
      #hud {
        position: fixed; top: 10px; left: 10px; z-index: 10;
        color: #ffe999; background: rgba(2, 6, 12, 0.82);
        border: 1px solid rgba(255, 232, 121, 0.5); border-radius: 10px;
        padding: 10px 14px; font: 700 13px/1.6 "Hiragino Sans", "Yu Gothic", sans-serif;
        max-width: 340px;
      }
      #hud b { color: #fff3ad; }
      #hud .close { float: right; cursor: pointer; color: #fff; }
    </style>
  </head>
  <body>
    <div id="hud">
      <span class="close" onclick="this.parentElement.style.display='none'">×</span>
      <b>田野浜謎解きVR(試作)</b><br />
      Quest: ブラウザでこのページを開き右下の「VR」ボタン。<br />
      コントローラのレイで <b>床の光る円</b> を撃つと移動、<br />
      石板・文字・ボタンはレイ+トリガーで押せます。<br />
      PC: WASD+マウスで歩けます(クリックで操作)。
    </div>
    <a-scene background="color: #020409" renderer="antialias: true; colorManagement: true; foveationLevel: 1">
      <a-assets timeout="15000">
        <img id="imgIntro" src="../assets/intro-current-isekai.webp" />
        <img id="imgS1" src="../assets/stage01-problem-ver2.webp" />
        <img id="imgS2" src="../assets/stage02-problem-clean.webp" />
        <img id="imgS3" src="../assets/stage03-problem-clean.webp" />
        <img id="imgS4" src="../assets/stage04-problem-clean.webp" />
        <img id="imgS5" src="../assets/stage05-problem-clean.webp" />
        <img id="imgSpell" src="../assets/stage01-spell.webp" />
      </a-assets>

      <a-entity id="world"></a-entity>

      <a-entity id="rig" position="0 0 0">
        <a-entity id="cam" camera="far: 200" look-controls="pointerLockEnabled: false" wasd-controls="acceleration: 22" position="0 1.6 0"></a-entity>
        <a-entity laser-controls="hand: left" raycaster="objects: .clickable; far: 12"></a-entity>
        <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 12"></a-entity>
      </a-entity>
      <a-entity id="mouseCursor" cursor="rayOrigin: mouse" raycaster="objects: .clickable; far: 60"></a-entity>
    </a-scene>
    <script src="./vr.js"></script>
  </body>
</html>
